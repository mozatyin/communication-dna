<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="start_screen" class="screen">
        <div id="bg"></div>
        <div id="ground"></div>
        <div id="title_logo">Flappy Bird</div>
        <div id="bird_preview"></div>
        <button id="btn_play">Play</button>
        <button id="btn_leaderboard">Score</button>
    </div>

    <div id="gameplay" class="screen" style="display:none;">
        <canvas id="gameCanvas" width="1080" height="1920"></canvas>
    </div>

    <div id="game_over" class="screen" style="display:none;">
        <div id="bg"></div>
        <div id="ground"></div>
        <div id="gameover_text">Game Over</div>
        <div id="score_panel">
            <div id="medal_icon"></div>
            <div id="score_value">0</div>
            <div id="best_value">0</div>
        </div>
        <button id="btn_restart">Play</button>
        <button id="btn_leaderboard_go">Score</button>
    </div>

    <div id="leaderboard" class="screen" style="display:none;">
        <div id="panel_bg">
            <div id="title">Leaderboard</div>
            <div id="score_list">Best Score: 0</div>
            <button id="btn_close">OK</button>
        </div>
    </div>

    <script src="core.js"></script>
</body>
</html>
