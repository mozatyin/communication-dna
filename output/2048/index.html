<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main Menu Screen -->
    <div id="main_menu" class="screen">
        <div id="bg"></div>
        <div id="title">2048</div>
        <div id="subtitle">合并数字，挑战2048！</div>
        <button id="btn_play">开始游戏</button>
        <button id="btn_leaderboard">排行榜</button>
    </div>

    <!-- Gameplay Screen -->
    <div id="gameplay" class="screen" style="display:none;">
        <div id="bg"></div>
        <div id="title_small">2048</div>
        <div id="score_box">
            <div id="score_label">SCORE</div>
            <div id="score_value">0</div>
        </div>
        <div id="best_box">
            <div id="best_label">BEST</div>
            <div id="best_value">0</div>
        </div>
        <button id="btn_new_game">新游戏</button>
        <div id="grid_bg">
            <div id="game_grid"></div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- Game Over Screen -->
    <div id="game_over" class="screen" style="display:none;">
        <div id="bg"></div>
        <div id="overlay">
            <div id="gameover_text">游戏结束</div>
            <div id="final_score">最终得分: 0</div>
            <button id="btn_retry">重新开始</button>
            <button id="btn_menu">返回菜单</button>
            <button id="btn_leaderboard_go">排行榜</button>
        </div>
    </div>

    <!-- Leaderboard Screen -->
    <div id="leaderboard" class="screen" style="display:none;">
        <div id="panel_bg">
            <div id="title">排行榜</div>
            <div id="score_list">
                <div>1. 最高分: <span id="best_score_display">0</span></div>
                <div>2. 当前分: <span id="current_score_display">0</span></div>
            </div>
            <button id="btn_close">关闭</button>
        </div>
    </div>

    <script src="core.js"></script>
</body>
</html>
