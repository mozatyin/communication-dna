<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块 (Tetris)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main_menu" class="screen">
        <div id="bg"></div>
        <div id="title">TETRIS</div>
        <div id="block_preview"></div>
        <div id="high_score">最高分: 0</div>
        <button id="btn_start">开始游戏</button>
        <button id="btn_leaderboard">排行榜</button>
    </div>

    <div id="gameplay" class="screen" style="display:none;">
        <div id="bg"></div>
        <div id="grid_border">
            <canvas id="gameCanvas"></canvas>
        </div>
        <div id="current_block"></div>
        <div id="next_label">NEXT</div>
        <div id="next_block"></div>
        <div id="score_label">得分</div>
        <div id="score_value">0</div>
        <div id="level_label">等级</div>
        <div id="level_value">1</div>
        <div id="lines_label">行数</div>
        <div id="lines_value">0</div>
    </div>

    <div id="game_over" class="screen" style="display:none;">
        <div id="bg"></div>
        <div id="gameover_text">GAME OVER</div>
        <div id="final_score">得分: 0</div>
        <div id="final_lines">消除行数: 0</div>
        <button id="btn_retry">重试</button>
        <button id="btn_leaderboard">排行榜</button>
        <button id="btn_menu">主菜单</button>
    </div>

    <div id="leaderboard" class="screen" style="display:none;">
        <div id="panel_bg">
            <div id="title">排行榜</div>
            <div id="score_list">暂无记录</div>
            <button id="btn_close">关闭</button>
        </div>
    </div>

    <script src="core.js"></script>
</body>
</html>
