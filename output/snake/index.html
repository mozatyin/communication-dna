<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main_menu" class="screen">
        <div id="bg"></div>
        <div id="title">贪吃蛇</div>
        <div id="snake_preview"></div>
        <div id="high_score">最高分: 0</div>
        <button id="btn_start">开始游戏</button>
    </div>

    <div id="gameplay" class="screen" style="display:none;">
        <div id="bg"></div>
        <div id="score_display">分数: 0</div>
        <div id="best_display">最高: 0</div>
        <div id="game_grid">
            <canvas id="gameCanvas" width="1000" height="1000"></canvas>
        </div>
        <div id="snake"></div>
        <div id="food_item"></div>
        <button id="btn_up">↑</button>
        <button id="btn_left">←</button>
        <button id="btn_right">→</button>
        <button id="btn_down">↓</button>
    </div>

    <div id="game_over" class="screen" style="display:none;">
        <div id="bg"></div>
        <div id="gameover_text">游戏结束</div>
        <div id="final_score">最终分数: 0</div>
        <button id="btn_retry">重新开始</button>
        <button id="btn_leaderboard">排行榜</button>
        <button id="btn_menu">返回菜单</button>
    </div>

    <div id="leaderboard" class="screen" style="display:none;">
        <div id="bg"></div>
        <div id="panel_bg">
            <div id="title">排行榜</div>
            <div id="score_list">
                1. 暂无记录<br>
                2. 暂无记录<br>
                3. 暂无记录<br>
                4. 暂无记录<br>
                5. 暂无记录
            </div>
            <button id="btn_close">关闭</button>
        </div>
    </div>

    <script src="core.js"></script>
</body>
</html>
