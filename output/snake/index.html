<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main Menu Screen -->
    <div id="main_menu" class="screen">
        <div id="bg" class="bg-image"></div>
        <div id="title">贪吃蛇</div>
        <div id="snake_preview" class="snake-preview"></div>
        <div id="high_score">最高分: 0</div>
        <button id="btn_start">开始游戏</button>
    </div>

    <!-- Gameplay Screen -->
    <div id="gameplay" class="screen" style="display: none;">
        <div id="bg" class="bg-image"></div>
        <div id="score_display">分数: 0</div>
        <div id="best_display">最高: 0</div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="game_grid"></div>
        <div class="controls">
            <button id="btn_up" class="control-btn">↑</button>
            <div class="control-row">
                <button id="btn_left" class="control-btn">←</button>
                <button id="btn_right" class="control-btn">→</button>
            </div>
            <button id="btn_down" class="control-btn">↓</button>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game_over" class="screen" style="display: none;">
        <div id="bg" class="bg-image"></div>
        <div id="gameover_text">游戏结束</div>
        <div id="final_score">最终分数: 0</div>
        <button id="btn_retry">重新开始</button>
        <button id="btn_leaderboard">排行榜</button>
        <button id="btn_menu">返回菜单</button>
    </div>

    <!-- Leaderboard Screen -->
    <div id="leaderboard" class="screen" style="display: none;">
        <div id="bg" class="bg-image"></div>
        <div id="panel_bg">
            <div id="title">排行榜</div>
            <div id="score_list">
                1. 暂无记录<br>
                2. 暂无记录<br>
                3. 暂无记录<br>
                4. 暂无记录<br>
                5. 暂无记录
            </div>
            <button id="btn_close">关闭</button>
        </div>
    </div>

    <script src="core.js"></script>
</body>
</html>
