<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫雷</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main Menu Screen -->
    <div id="main_menu" class="screen">
        <div id="bg" class="bg-image"></div>
        <div id="title">扫雷</div>
        <button id="btn_play" class="menu-button" data-action="beginner">开始游戏</button>
        <button id="btn_leaderboard" class="menu-button" data-action="leaderboard">排行榜</button>
    </div>

    <!-- Gameplay Screen -->
    <div id="gameplay" class="screen" style="display:none;">
        <div id="bg" class="bg-image"></div>
        <div id="score_display">得分: 0</div>
        <div id="mine_count">💣 10</div>
        <div id="timer">⏱ 000</div>
        <div id="grid_bg"></div>
        <canvas id="gameCanvas"></canvas>
        <div id="flag_count">🚩 0</div>
        <button id="tap_area" class="invisible-button"></button>
    </div>

    <!-- Game Over Screen -->
    <div id="game_over" class="screen" style="display:none;">
        <div id="bg" class="bg-image game-over-bg"></div>
        <div id="gameover_text">游戏结束</div>
        <div id="final_score">最终得分: 0</div>
        <button id="btn_retry" class="menu-button" data-action="retry">重新开始</button>
        <button id="btn_menu" class="menu-button" data-action="menu">返回菜单</button>
        <button id="btn_leaderboard" class="menu-button" data-action="leaderboard">排行榜</button>
    </div>

    <!-- Leaderboard Screen -->
    <div id="leaderboard" class="screen" style="display:none;">
        <div id="bg" class="bg-image"></div>
        <div id="panel_bg">
            <div id="title">排行榜</div>
            <div id="score_list">
                <div class="score-entry">1. 暂无记录</div>
                <div class="score-entry">2. 暂无记录</div>
                <div class="score-entry">3. 暂无记录</div>
                <div class="score-entry">4. 暂无记录</div>
                <div class="score-entry">5. 暂无记录</div>
            </div>
            <button id="btn_close" class="menu-button" data-action="close">关闭</button>
        </div>
    </div>

    <script src="core.js"></script>
</body>
</html>
